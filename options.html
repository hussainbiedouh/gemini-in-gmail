<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini for Gmail - Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      padding: 24px;
      max-width: 560px;
      margin: 0 auto;
      background: #f6f8fc;
      color: #1f1f1f;
    }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p.subtitle { color: #5f6368; font-size: 14px; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: 500; font-size: 14px; margin-bottom: 6px; color: #3c4043; }
    input[type="password"], select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
      background: #fff;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26,115,232,0.15);
    }
    .btn-row { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; }
    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:hover { background: #1765cc; }
    .btn-secondary { background: #e8eaed; color: #3c4043; }
    .btn-secondary:hover { background: #d2d5d9; }
    .btn-success { background: #188038; color: #fff; }
    .btn-success:hover { background: #146c2e; }
    .btn-danger { background: #d93025; color: #fff; }
    .btn-danger:hover { background: #b3261e; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #status {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    #status.success { display: block; background: #e6f4ea; color: #137333; border: 1px solid #ceead6; }
    #status.error { display: block; background: #fce8e6; color: #c5221f; border: 1px solid #f5c6c2; }
    #status.info { display: block; background: #e8f0fe; color: #1a73e8; border: 1px solid #c6dafc; }
    #status.testing { display: block; background: #fef7e0; color: #b06000; border: 1px solid #fde293; }
    .icon-placeholder {
      width: 48px; height: 48px; background: #1a73e8;
      border-radius: 12px; display: flex; align-items: center;
      justify-content: center; color: white; font-size: 24px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="icon-placeholder">&#x2728;</div>
  <h1>Gemini for Gmail</h1>
  <p class="subtitle">Configure your Google Gemini API key to enable AI-assisted email composition.</p>

  <div class="form-group">
    <label for="apiKey">Gemini API Key</label>
    <input type="password" id="apiKey" placeholder="Paste your Gemini API key here..." autocomplete="off">
  </div>

  <div class="form-group">
    <label for="model">Gemini Model</label>
    <select id="model">
      <option value="gemini-flash-lite-latest">gemini-flash-lite-latest (Recommended - Fast &amp; Cost-effective)</option>
      <option value="gemini-2.0-flash">gemini-2.0-flash (Balanced)</option>
      <option value="gemini-2.5-flash">gemini-2.5-flash (Latest Flash)</option>
    </select>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="saveBtn">Save</button>
    <button class="btn btn-secondary" id="testBtn">Test API Key</button>
    <button class="btn btn-danger" id="clearBtn">Clear Key</button>
  </div>

  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
